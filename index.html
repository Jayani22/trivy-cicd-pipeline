<!DOCTYPE html>
<html>
<head>
    <title>DevOps CI/CD Pipeline</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        .badge {
            margin-top: 20px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚀 CI/CD Pipeline with Trivy Security Scan</h1>

    <p>
        This application is automatically built, scanned, and deployed using
        <strong>GitHub Actions</strong>, <strong>Docker</strong>, and <strong>Trivy</strong>.
    </p>

    <p>
        The deployment is fully automated to an <strong>AWS EC2 instance</strong>.
    </p>

    <div class="badge">
        Secure Deployment Active
    </div>
</div>

</body>
</html>
