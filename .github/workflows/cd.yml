name: CD Pipeline
on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-trivy-app:${IMAGE_TAG} .
    
      - name: Push Docker Image
        run: |
            docker push ${{ secrets.DOCKER_USERNAME }}/devops-trivy-app:${IMAGE_TAG}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        env:
            IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            envs: IMAGE_TAG
            script: |
                docker pull ${{ secrets.DOCKER_USERNAME }}/devops-trivy-app:$IMAGE_TAG
                docker stop devops-container || true
                docker rm devops-container || true
                docker run -d -p 80:80 --name devops-container ${{ secrets.DOCKER_USERNAME }}/devops-trivy-app:$IMAGE_TAG